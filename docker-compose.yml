version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fiap-fase1-postgres
    environment:
      POSTGRES_DB: fiap_fase1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - fiap_fase1_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fiapnet

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiap-fase1-app
    environment:
      SPRING_PROFILES_ACTIVE: dev   # Usa application.yml (profile dev)
      SERVER_PORT: 8080
      TZ: America/Sao_Paulo
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fiapnet

volumes:
  fiap_fase1_postgres_data:

networks:
  fiapnet:
    driver: bridge