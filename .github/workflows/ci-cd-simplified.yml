# 🔄 CI/CD - Opção Simplificada (SonarCloud Opcional)

name: CI/CD Pipeline - Simplified

on:
  workflow_dispatch: # Desabilitado até configurar Render.com (TASK-031)

jobs:
  # Job 1: Build e Testes (OBRIGATÓRIO)
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Run Tests
        run: mvn test

  # Job 2: SonarCloud (OPCIONAL - só roda se tiver label)
  sonarcloud:
    name: SonarCloud Analysis (Optional)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'sonar')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=SEU_USUARIO_fase-1-spring-explorer

  # Job 3: Deploy no Render (só após merge na main)
  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      
      - name: Deployment Status
        run: echo "✅ Deploy triggered on Render.com"
