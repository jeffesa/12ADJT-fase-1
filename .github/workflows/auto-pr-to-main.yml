name: Auto PR develop → main

on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for differences
        id: diff-check
        run: |
          DIFF=$(git diff origin/main..origin/develop --stat)
          if [ -z "$DIFF" ]; then
            echo "develop e main são idênticas. Nenhum PR necessário."
            echo "has_diff=false" >> $GITHUB_OUTPUT
          else
            echo "Diferenças encontradas entre develop e main."
            echo "has_diff=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request to main
        if: steps.diff-check.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            echo "Criando PR de develop para main..."
            gh pr create \
              --base main \
              --head develop \
              --title "chore: sync develop → main" \
              --body "PR automático criado após merge na develop."
          else
            echo "PR #$EXISTING_PR já existe, pulando criação."
          fi
