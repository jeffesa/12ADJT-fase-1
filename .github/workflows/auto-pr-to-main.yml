name: Auto PR develop → main

on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base main \
              --head develop \
              --title "chore: sync develop → main" \
              --body "PR automático criado após merge na develop." \
              --label "auto-pr" || true
          else
            echo "PR #$EXISTING_PR já existe, pulando criação."
          fi
