# 🚀 Deploy Automático - Opção Minimalista

name: Auto Deploy to Render

on:
  workflow_dispatch: # Desabilitado até configurar Render.com (TASK-031)

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      
      - name: Deployment Status
        run: echo "✅ Deploy triggered on Render.com - Check logs at https://dashboard.render.com"
